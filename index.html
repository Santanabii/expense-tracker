<!DOCTYPE html>
<html lang="en" class="bg-gray-100 min-h-screen">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>

    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div class="container mx-auto max-w-4xl px-4 py-10">
      <header class="text-center mb-10">
        <h1 class="text-4xl font-bold text-gray-800 mb-2">Expense Tracker</h1>
        <p class="text-gray-600">Track your daily spending</p>
      </header>

      <div class="bg-white rounded-xl shadow-md p-6 mb-8">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
          <input
            id="description"
            type="text"
            placeholder="What did you buy?"
            class="md:col-span-5 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
          />
          <input
            id="amount"
            type="number"
            step="0.01"
            min="0"
            placeholder="Amount"
            class="md:col-span-3 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
          />
          <select
            id="category"
            class="md:col-span-2 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary bg-white"
          >
            <option value="">Category</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Bills">Bills</option>
            <option value="Shopping">Shopping</option>
            <option value="Health">Health</option>
            <option value="Other">Other</option>
          </select>
          <button
            id="addBtn"
            class="md:col-span-2 bg-black hover:translate-y-0.5s text-white font-medium py-3 px-6 rounded-lg transition duration-200"
          >
            Add Expense
          </button>
        </div>
      </div>

      <div
        class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4"
      >
        <div class="flex items-center gap-3">
          <label for="filter" class="font-medium text-gray-700"
            >Filter by category:</label
          >
          <select
            id="filter"
            class="px-4 py-2 border border-gray-300 rounded-lg bg-white"
          >
            <option value="all">All</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Bills">Bills</option>
            <option value="Shopping">Shopping</option>
            <option value="Health">Health</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="text-xl font-bold text-gray-800">
          Total: <span id="total" class="text-2xl text-primary">KES 0.00</span>
        </div>
      </div>

      <div class="bg-white rounded-xl shadow-md overflow-hidden">
        <ul
          id="expensesList"
          class="divide-y divide-gray-200 min-h-[200px]"
        ></ul>
        <div id="emptyState" class="py-16 text-center text-gray-500 hidden">
          No expenses recorded yet.
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
